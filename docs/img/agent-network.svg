<svg viewBox="0 0 400 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agent network diagram showing a central brain node connected to six specialized agent satellites">
  <style>
    .an-hex { animation: anPulse 3s ease-in-out infinite; transform-origin: 200px 180px; }
    @keyframes anPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.025); } }
    .an-orbit { animation: anOrbit 25s linear infinite; transform-origin: 200px 180px; }
    @keyframes anOrbit { to { transform: rotate(360deg); } }
  </style>

  <!-- Background glow -->
  <defs>
    <radialGradient id="heroGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,204,0,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,204,0,0)"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="180" r="170" fill="url(#heroGlow)"/>

  <!-- Connecting dashed lines to satellites -->
  <!-- top: (200,70) -->
  <line x1="200" y1="180" x2="200" y2="70" stroke="rgba(255,204,0,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- top-right: (305,125) -->
  <line x1="200" y1="180" x2="305" y2="125" stroke="rgba(255,204,0,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- bottom-right: (305,235) -->
  <line x1="200" y1="180" x2="305" y2="235" stroke="rgba(255,204,0,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- bottom: (200,290) -->
  <line x1="200" y1="180" x2="200" y2="290" stroke="rgba(255,204,0,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- bottom-left: (95,235) -->
  <line x1="200" y1="180" x2="95" y2="235" stroke="rgba(255,204,0,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- top-left: (95,125) -->
  <line x1="200" y1="180" x2="95" y2="125" stroke="rgba(255,204,0,0.12)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Satellite: Orchestrator (top, 200,70) -->
  <circle cx="200" cy="70" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,204,0,0.25)" stroke-width="1"/>
  <g stroke="rgba(255,204,0,0.7)" stroke-width="1.2" stroke-linecap="round">
    <line x1="193" y1="76" x2="207" y2="64"/>
    <polyline points="204,64 207,64 207,67" fill="none"/>
    <line x1="207" y1="76" x2="193" y2="64"/>
    <polyline points="196,64 193,64 193,67" fill="none"/>
  </g>

  <!-- Satellite: Writer (top-right, 305,125) -->
  <circle cx="305" cy="125" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,204,0,0.25)" stroke-width="1"/>
  <g stroke="rgba(255,204,0,0.7)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M301 119l8 12-4-1-3 3-1-4z"/>
    <line x1="303" y1="121" x2="307" y2="127"/>
  </g>

  <!-- Satellite: Analyst (bottom-right, 305,235) -->
  <circle cx="305" cy="235" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,204,0,0.25)" stroke-width="1"/>
  <g fill="rgba(255,204,0,0.7)">
    <rect x="299" y="232" width="3" height="8" rx="0.5"/>
    <rect x="304" y="228" width="3" height="12" rx="0.5"/>
    <rect x="309" y="230" width="3" height="10" rx="0.5"/>
  </g>

  <!-- Satellite: Reviewer (bottom, 200,290) -->
  <circle cx="200" cy="290" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,204,0,0.25)" stroke-width="1"/>
  <circle cx="200" cy="290" r="8" stroke="rgba(255,204,0,0.4)" stroke-width="0.8" fill="none"/>
  <polyline points="196,290 199,293 205,286"
    stroke="rgba(255,204,0,0.7)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Satellite: Knowledge (bottom-left, 95,235) -->
  <circle cx="95" cy="235" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,204,0,0.25)" stroke-width="1"/>
  <g stroke="rgba(255,204,0,0.7)" stroke-width="1.2" fill="none" stroke-linejoin="round">
    <path d="M89 232l6-6v12l-6-6z"/>
    <path d="M101 232l-6-6v12l6-6z"/>
    <line x1="95" y1="226" x2="95" y2="244"/>
  </g>

  <!-- Satellite: Tools (top-left, 95,125) -->
  <circle cx="95" cy="125" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,204,0,0.25)" stroke-width="1"/>
  <g stroke="rgba(255,204,0,0.7)" stroke-width="1.2" fill="none">
    <circle cx="95" cy="125" r="5"/>
    <circle cx="95" cy="125" r="2"/>
    <!-- Gear teeth at 0°,60°,120°,180°,240°,300° -->
    <line x1="100" y1="125" x2="103" y2="125" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="97.5" y1="129.3" x2="99" y2="131.9" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="92.5" y1="129.3" x2="91" y2="131.9" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="90" y1="125" x2="87" y2="125" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="92.5" y1="120.7" x2="91" y2="118.1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="97.5" y1="120.7" x2="99" y2="118.1" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Central hexagon (pulsing) -->
  <!-- Points: 200,140 234.6,160 234.6,200 200,220 165.4,200 165.4,160 -->
  <g class="an-hex">
    <polygon points="200,140 234.6,160 234.6,200 200,220 165.4,200 165.4,160"
      stroke="#ffcc00" stroke-width="1.5" fill="rgba(255,204,0,0.08)"/>
    <!-- Circuit/brain icon inside -->
    <g stroke="rgba(255,204,0,0.6)" stroke-width="1" stroke-linecap="round" fill="none">
      <line x1="188" y1="180" x2="212" y2="180"/>
      <line x1="195" y1="180" x2="195" y2="170"/>
      <line x1="195" y1="170" x2="205" y2="170"/>
      <line x1="205" y1="180" x2="205" y2="190"/>
      <line x1="205" y1="190" x2="195" y2="190"/>
    </g>
    <!-- Neural dots -->
    <circle cx="188" cy="180" r="2" fill="rgba(255,204,0,0.5)"/>
    <circle cx="212" cy="180" r="2" fill="rgba(255,204,0,0.5)"/>
    <circle cx="195" cy="170" r="1.5" fill="rgba(255,204,0,0.4)"/>
    <circle cx="205" cy="170" r="1.5" fill="rgba(255,204,0,0.4)"/>
    <circle cx="205" cy="190" r="1.5" fill="rgba(255,204,0,0.4)"/>
    <circle cx="195" cy="190" r="1.5" fill="rgba(255,204,0,0.4)"/>
  </g>

  <!-- Orbiting decorative dots (r=160 circle, rotating group) -->
  <g class="an-orbit">
    <circle cx="360" cy="180" r="1.5" fill="rgba(255,204,0,0.15)"/>
    <circle cx="120" cy="318.6" r="1.5" fill="rgba(255,204,0,0.15)"/>
    <circle cx="120" cy="41.4" r="1.5" fill="rgba(255,204,0,0.15)"/>
  </g>
</svg>
