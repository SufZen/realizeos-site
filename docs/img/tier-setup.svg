<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Setup assistance handshake icon">
  <style>
    .ts-float { animation: tsFloat 4s ease-in-out infinite; }
    @keyframes tsFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  </style>
  <!-- Wrench (floating) -->
  <g class="ts-float">
    <path d="M34 6a5 5 0 00-4 8l-2 2 3 3 2-2a5 5 0 008-4 5 5 0 00-5-5l-1 3 2 2-2 2-2-2 3-1a3 3 0 01-2-6z"
      stroke="#ffcc00" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- Handshake — left hand -->
  <path d="M10 36h10l6-6 4 4-4 4h-2l-2 2v6H10z"
    stroke="#9a9ab0" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Right hand -->
  <path d="M54 36H44l-6-6-4 4 4 4h2l2 2v6H54z"
    stroke="#9a9ab0" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Central grip -->
  <path d="M28 34l4-4 4 4"
    stroke="#9a9ab0" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
